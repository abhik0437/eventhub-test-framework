name: Deploy Allure Report

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      BASE_URL: https://eventhub.rahulshettyacademy.com
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run Tests (Single Browser)
        run: npx playwright test --project=chromium --grep "@regression"

      # 🆕 STEP 1: Download previous Pages artifact (contains old report)
      - name: Download previous report
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: old-report
        continue-on-error: true

      # 🆕 STEP 2: Copy history into new results
      - name: Copy Allure history
        run: |
          if [ -d old-report/history ]; then
            mkdir -p allure-results/history
            cp -r old-report/history/* allure-results/history/
          fi

      - name: Generate Allure Report
        run: npm run report:allure

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4